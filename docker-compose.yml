services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bulwark
      POSTGRES_PASSWORD: bulwark
      POSTGRES_DB: bulwark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulwark"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bulwark:bulwark@db:5432/bulwark
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
